version: "3.8"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: itsknyy/todoapp-backend:${APP_VERSION}
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: tododb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db

  frontend:
    image: itsknyy/todoapp-frontend:${APP_VERSION}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: